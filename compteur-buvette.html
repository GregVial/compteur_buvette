<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Compteur buvette</title>
<style>

  /* ===== Tokens ===== */
  :root{
    --paper:      #f6efe2;   /* fond ardoise/papier */
    --ardoise:    #1f2d28;   /* vert sapin très sombre, fond carte */
    --ardoise-2:  #28392f;
    --craie:      #f6efe2;   /* texte sur ardoise */
    --liege:      #c98a3c;   /* accent cuivre/bière */
    --liege-deep: #a86b27;
    --encre:      #1f2d28;
    --ligne:      rgba(31,45,40,0.14);
    --ok:         #4f7a52;
    --danger:     #9c4a3c;

    --radius: 14px;
    --radius-sm: 9px;

    --font-display: "Fraunces", Georgia, "Iowan Old Style", serif;
    --font-body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-num: "Spectral", Georgia, serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0;
    background: var(--paper);
    color: var(--encre);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  body{
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 24px) env(safe-area-inset-left);
  }

  @font-face{ /* fallback géré nativement, pas de fetch externe nécessaire */ }

  .wrap{
    max-width: 560px;
    margin: 0 auto;
    padding: 22px 14px 0;
  }

  /* ===== Bouton remise à zéro ===== */
  .reset-btn{
    border:1.5px solid var(--encre);
    background: transparent;
    color: var(--encre);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 7px 11px;
    border-radius: 999px;
    cursor:pointer;
  }
  .reset-btn:active{ transform: scale(0.96); }
  .reset-btn.reset-arme{
    background: var(--danger);
    border-color: var(--danger);
    color: var(--craie);
  }

  /* ===== Lignes produits ===== */
  .ligne{
    display:grid;
    grid-template-columns: 1fr auto;
    align-items:center;
    gap: 10px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--ligne);
  }
  .ligne:last-of-type{ border-bottom:none; }

  .produit-info{
    display:flex;
    align-items:baseline;
    gap: 10px;
    min-width:0;
  }
  .produit-nom{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.18rem;
  }
  .produit-prix{
    font-size: 0.82rem;
    color: #6b6256;
    font-weight: 500;
    white-space:nowrap;
  }

  .stepper{
    display:flex;
    align-items:center;
    gap: 0;
    background: var(--ardoise);
    border-radius: var(--radius);
    overflow:hidden;
    flex-shrink:0;
  }
  .stepper button{
    width: 44px;
    height: 44px;
    border:none;
    background: transparent;
    color: var(--craie);
    font-size: 1.4rem;
    font-weight: 400;
    line-height: 1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    touch-action: manipulation;
  }
  .stepper button:active{ background: rgba(255,255,255,0.12); }
  .stepper .count{
    min-width: 38px;
    text-align:center;
    font-family: var(--font-num);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--craie);
    background: var(--ardoise-2);
    height: 44px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Variante consigne : même structure que les boissons, + un mini-stepper "rendues" au milieu */
  .ligne-consigne{
    grid-template-columns: minmax(0,1fr) auto auto;
    gap: 6px;
  }
  .ligne-consigne .produit-info{ flex-direction:column; align-items:flex-start; gap:1px; min-width:0; overflow:visible; }
  .ligne-consigne .produit-nom{ font-size: 1.02rem; color:#4a443c; white-space:normal; }
  .ligne-consigne .produit-prix{ font-size:0.74rem; }
  .auto-tag{
    display:inline-block;
    flex-shrink:0;
    font-size: 0.58rem;
    text-transform:uppercase;
    letter-spacing:0.04em;
    font-weight:700;
    color: var(--liege-deep);
    border:1px solid var(--liege-deep);
    border-radius:999px;
    padding: 1px 5px;
    margin-left: 5px;
    vertical-align: 2px;
  }

  .mini-stepper{
    display:flex;
    align-items:center;
    background:#cfc7b6;
    border-radius: var(--radius-sm);
    overflow:hidden;
    flex-shrink:0;
  }
  .mini-stepper-rendues{
    position:relative;
    padding-top: 13px;
  }
  .mini-stepper .mini-label{
    position:absolute;
    top: -1px;
    left: 0;
    right: 0;
    text-align:center;
    font-size: 0.56rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
    font-weight:700;
    color:#8a8275;
  }
  .mini-stepper button{
    width: 28px;
    height: 30px;
    border:none;
    background: transparent;
    color: #3a3530;
    font-size: 1rem;
    line-height: 1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    touch-action: manipulation;
  }
  .mini-stepper button:active{ background: rgba(0,0,0,0.08); }
  .mini-stepper .count{
    min-width: 20px;
    text-align:center;
    font-family: var(--font-num);
    font-size: 0.9rem;
    font-weight: 600;
    color:#27221d;
    background:#c0b7a2;
    height: 30px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .ligne-consigne .stepper{ background:#cfc7b6; }
  .ligne-consigne .stepper button{ color:#3a3530; }
  .ligne-consigne .stepper .count{ background:#c0b7a2; color:#27221d; }

  /* ===== Sous-totaux ===== */
  .souslignes{
    margin-top: 10px;
    padding: 10px 4px 2px;
    font-size: 0.85rem;
    color:#6b6256;
  }
  .sousligne-row{
    display:flex;
    justify-content:space-between;
    padding: 3px 0;
  }
  .sousligne-row span:last-child{ font-family: var(--font-num); font-weight:600; color:var(--encre); }

  /* ===== Total ===== */
  .total-bloc{
    margin-top: 16px;
    background: var(--ardoise);
    border-radius: var(--radius);
    padding: 18px 18px 18px;
    color: var(--craie);
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap: 10px;
  }
  .total-bloc::before{
    content:"";
    position:absolute;
    top:-30px; right:-30px;
    width:120px; height:120px;
    background: radial-gradient(circle, rgba(201,138,60,0.35), transparent 70%);
  }
  .total-chiffre{
    flex: 0 1 50%;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2.6rem;
    line-height:1.15;
    position:relative;
    z-index:1;
  }
  .total-chiffre sup{
    font-size: 1.1rem;
    font-weight:600;
    margin-left: 2px;
  }
  .total-bloc .reset-btn{
    flex-shrink:0;
    position:relative;
    z-index:1;
    border-color: rgba(246,239,226,0.5);
    color: var(--craie);
  }
  .total-bloc .reset-btn.reset-arme{
    background: var(--danger);
    border-color: var(--danger);
  }

  footer.note{
    text-align:center;
    font-size: 0.7rem;
    color:#9a9080;
    padding: 18px 10px 4px;
  }

  /* Focus visible clavier */
  button:focus-visible{
    outline: 2px solid var(--liege-deep);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  @media (min-width:560px){
    .total-chiffre{ font-size: 3rem; }
  }
</style>
</head>
<body>

<div class="wrap">



  <main>
    <div class="ligne" data-id="biere">
      <div class="produit-info">
        <span class="produit-nom">Bière</span>
        <span class="produit-prix">2,50 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer une bière">−</button>
        <span class="count" data-display="biere">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une bière">+</button>
      </div>
    </div>

    <div class="ligne" data-id="cruche">
      <div class="produit-info">
        <span class="produit-nom">Cruche bière</span>
        <span class="produit-prix">15,00 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer une cruche de bière">−</button>
        <span class="count" data-display="cruche">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une cruche de bière">+</button>
      </div>
    </div>

    <div class="ligne" data-id="soft">
      <div class="produit-info">
        <span class="produit-nom">Soft</span>
        <span class="produit-prix">2,00 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer un soft">−</button>
        <span class="count" data-display="soft">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter un soft">+</button>
      </div>
    </div>

    <div class="ligne" data-id="eau">
      <div class="produit-info">
        <span class="produit-nom">Eau</span>
        <span class="produit-prix">1,00 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer une eau">−</button>
        <span class="count" data-display="eau">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une eau">+</button>
      </div>
    </div>

    <div class="ligne" data-id="vin">
      <div class="produit-info">
        <span class="produit-nom">Vin verre</span>
        <span class="produit-prix">1,50 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer un verre de vin">−</button>
        <span class="count" data-display="vin">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter un verre de vin">+</button>
      </div>
    </div>

    <div class="ligne ligne-consigne" data-id="consigne">
      <div class="produit-info">
        <span class="produit-nom">Consigne<span class="auto-tag">auto</span></span>
        <span class="produit-prix">1,00 €</span>
      </div>
      <div class="mini-stepper mini-stepper-rendues" data-consigne="consigne" data-champ="rendues">
        <span class="mini-label">Rendues</span>
        <button type="button" data-action="moins" aria-label="Retirer une consigne rendue">−</button>
        <span class="count" data-display="consigneRendues">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une consigne rendue">+</button>
      </div>
      <div class="stepper" data-consigne="consigne" data-champ="prises">
        <button type="button" data-action="moins" aria-label="Retirer une consigne prise">−</button>
        <span class="count" data-display="consignePrises">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une consigne prise">+</button>
      </div>
    </div>

    <div class="ligne ligne-consigne" data-id="consigneCruche">
      <div class="produit-info">
        <span class="produit-nom">Consigne cruche<span class="auto-tag">auto</span></span>
        <span class="produit-prix">5,00 €</span>
      </div>
      <div class="mini-stepper mini-stepper-rendues" data-consigne="consigneCruche" data-champ="rendues">
        <span class="mini-label">Rendues</span>
        <button type="button" data-action="moins" aria-label="Retirer une consigne cruche rendue">−</button>
        <span class="count" data-display="consigneCrucheRendues">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une consigne cruche rendue">+</button>
      </div>
      <div class="stepper" data-consigne="consigneCruche" data-champ="prises">
        <button type="button" data-action="moins" aria-label="Retirer une consigne cruche prise">−</button>
        <span class="count" data-display="consigneCruchePrises">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une consigne cruche prise">+</button>
      </div>
    </div>

    <div class="souslignes">
      <div class="sousligne-row"><span>Boissons</span><span data-display="sous-boissons">0,00 €</span></div>
      <div class="sousligne-row"><span>Consignes</span><span data-display="sous-consigne">0,00 €</span></div>
    </div>

    <div class="total-bloc">
      <div class="total-chiffre"><span data-display="total">0,00</span><sup>€</sup></div>
      <button class="reset-btn" id="btnReset" type="button">Remise à zéro</button>
    </div>
  </main>
</div>


<script>
(function(){
  "use strict";

  var PRIX = {
    biere: 2.5,
    cruche: 15.0,
    soft: 2.0,
    eau: 1.0,
    vin: 1.5,
    consigne: 1.0,
    consigneCruche: 5.0
  };

  // Boissons qui génèrent une consigne automatiquement, et laquelle.
  var LIEN_CONSIGNE = {
    biere: "consigne",
    cruche: "consigneCruche"
  };

  var IDS_BOISSONS = ["biere", "cruche", "soft", "eau", "vin"];
  var IDS_CONSIGNES = ["consigne", "consigneCruche"];

  var etat = { biere: 0, cruche: 0, soft: 0, eau: 0, vin: 0 };
  var consignes = {
    consigne: { prises: 0, rendues: 0 },
    consigneCruche: { prises: 0, rendues: 0 }
  };

  function formatEuro(n){
    var signe = n < 0 ? "−" : "";
    return signe + Math.abs(n).toFixed(2).replace(".", ",");
  }

  function netConsigne(id){
    return consignes[id].prises - consignes[id].rendues;
  }

  function maj(){
    IDS_BOISSONS.forEach(function(id){
      document.querySelector('[data-display="' + id + '"]').textContent = etat[id];
    });

    IDS_CONSIGNES.forEach(function(id){
      document.querySelector('[data-display="' + id + 'Prises"]').textContent = consignes[id].prises;
      document.querySelector('[data-display="' + id + 'Rendues"]').textContent = consignes[id].rendues;
    });

    var totalBoissons = 0;
    IDS_BOISSONS.forEach(function(id){ totalBoissons += etat[id] * PRIX[id]; });

    var totalConsigne = 0;
    IDS_CONSIGNES.forEach(function(id){ totalConsigne += netConsigne(id) * PRIX[id]; });

    var total = totalBoissons + totalConsigne;

    document.querySelector('[data-display="sous-boissons"]').textContent = formatEuro(totalBoissons) + " €";
    document.querySelector('[data-display="sous-consigne"]').textContent = formatEuro(totalConsigne) + " €";
    document.querySelector('[data-display="total"]').textContent = formatEuro(total);
  }

  function changerBoisson(id, delta){
    etat[id] = Math.max(0, etat[id] + delta);

    // Si cette boisson a une consigne associée, ses "prises" suivent du même delta.
    var idConsigne = LIEN_CONSIGNE[id];
    if(idConsigne){
      consignes[idConsigne].prises = Math.max(0, consignes[idConsigne].prises + delta);
    }

    maj();
  }

  function changerConsigne(id, champ, delta){
    consignes[id][champ] = Math.max(0, consignes[id][champ] + delta);
    maj();
  }

  document.querySelectorAll(".ligne:not(.ligne-consigne)").forEach(function(ligne){
    var id = ligne.getAttribute("data-id");
    ligne.querySelectorAll("button[data-action]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var action = btn.getAttribute("data-action");
        changerBoisson(id, action === "plus" ? 1 : -1);
      });
    });
  });

  document.querySelectorAll(".ligne-consigne [data-consigne]").forEach(function(conteneur){
    var idConsigne = conteneur.getAttribute("data-consigne");
    var champ = conteneur.getAttribute("data-champ");
    conteneur.querySelectorAll("button[data-action]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var action = btn.getAttribute("data-action");
        changerConsigne(idConsigne, champ, action === "plus" ? 1 : -1);
      });
    });
  });

  var btnReset = document.getElementById("btnReset");
  var resetArme = false;
  var resetTimer = null;

  btnReset.addEventListener("click", function(){
    if(!resetArme){
      resetArme = true;
      btnReset.textContent = "Confirmer ?";
      btnReset.classList.add("reset-arme");
      clearTimeout(resetTimer);
      resetTimer = setTimeout(function(){
        resetArme = false;
        btnReset.textContent = "Remise à zéro";
        btnReset.classList.remove("reset-arme");
      }, 3000);
      return;
    }

    clearTimeout(resetTimer);
    resetArme = false;
    btnReset.textContent = "Remise à zéro";
    btnReset.classList.remove("reset-arme");

    etat = { biere: 0, cruche: 0, soft: 0, eau: 0, vin: 0 };
    consignes = {
      consigne: { prises: 0, rendues: 0 },
      consigneCruche: { prises: 0, rendues: 0 }
    };
    maj();
  });

  maj();
})();
</script>

</body>
</html>
