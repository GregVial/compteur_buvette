<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Compteur buvette</title>
<style>

  /* ===== Tokens ===== */
  :root{
    --paper:      #f6efe2;   /* fond ardoise/papier */
    --ardoise:    #1f2d28;   /* vert sapin très sombre, fond carte */
    --ardoise-2:  #28392f;
    --craie:      #f6efe2;   /* texte sur ardoise */
    --liege:      #c98a3c;   /* accent cuivre/bière */
    --liege-deep: #a86b27;
    --encre:      #1f2d28;
    --ligne:      rgba(31,45,40,0.14);
    --ok:         #4f7a52;
    --danger:     #9c4a3c;

    --radius: 14px;
    --radius-sm: 9px;

    --font-display: "Fraunces", Georgia, "Iowan Old Style", serif;
    --font-body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-num: "Spectral", Georgia, serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0;
    background: var(--paper);
    color: var(--encre);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  body{
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 24px) env(safe-area-inset-left);
  }

  @font-face{ /* fallback géré nativement, pas de fetch externe nécessaire */ }

  .wrap{
    max-width: 560px;
    margin: 0 auto;
    padding: 18px 14px 0;
  }

  /* ===== En-tête ===== */
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    padding: 6px 4px 16px;
    border-bottom: 2px solid var(--encre);
    margin-bottom: 14px;
  }
  header h1{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.5rem;
    letter-spacing: -0.01em;
    margin:0;
  }
  header .souslogo{
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--liege-deep);
    font-weight: 700;
  }
  .reset-btn{
    border:1.5px solid var(--encre);
    background: transparent;
    color: var(--encre);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 7px 11px;
    border-radius: 999px;
    cursor:pointer;
  }
  .reset-btn:active{ transform: scale(0.96); }
  .reset-btn.reset-arme{
    background: var(--danger);
    border-color: var(--danger);
    color: var(--craie);
  }

  /* ===== Lignes produits ===== */
  .ligne{
    display:grid;
    grid-template-columns: 1fr auto;
    align-items:center;
    gap: 10px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--ligne);
  }
  .ligne:last-of-type{ border-bottom:none; }

  .produit-info{
    display:flex;
    align-items:baseline;
    gap: 10px;
    min-width:0;
  }
  .produit-nom{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.18rem;
  }
  .produit-prix{
    font-size: 0.82rem;
    color: #6b6256;
    font-weight: 500;
    white-space:nowrap;
  }

  .stepper{
    display:flex;
    align-items:center;
    gap: 0;
    background: var(--ardoise);
    border-radius: var(--radius);
    overflow:hidden;
    flex-shrink:0;
  }
  .stepper button{
    width: 44px;
    height: 44px;
    border:none;
    background: transparent;
    color: var(--craie);
    font-size: 1.4rem;
    font-weight: 400;
    line-height: 1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    touch-action: manipulation;
  }
  .stepper button:active{ background: rgba(255,255,255,0.12); }
  .stepper .count{
    min-width: 38px;
    text-align:center;
    font-family: var(--font-num);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--craie);
    background: var(--ardoise-2);
    height: 44px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Variante consigne : plus discrète, avec le badge "auto" */
  .ligne.consigne .produit-info{ flex-wrap: wrap; gap: 6px 10px; }
  .ligne.consigne .produit-nom{ font-size: 0.96rem; color:#4a443c; }
  .ligne.consigne .stepper{ background:#cfc7b6; }
  .ligne.consigne .stepper button{ color:#3a3530; }
  .ligne.consigne .stepper .count{ background:#c0b7a2; color:#27221d; }
  .auto-tag{
    display:inline-block;
    font-size: 0.62rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-weight:700;
    color: var(--liege-deep);
    border:1px solid var(--liege-deep);
    border-radius:999px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: 2px;
  }

  /* ===== Sous-totaux ===== */
  .souslignes{
    margin-top: 10px;
    padding: 10px 4px 2px;
    font-size: 0.85rem;
    color:#6b6256;
  }
  .sousligne-row{
    display:flex;
    justify-content:space-between;
    padding: 3px 0;
  }
  .sousligne-row span:last-child{ font-family: var(--font-num); font-weight:600; color:var(--encre); }

  /* ===== Total ===== */
  .total-bloc{
    margin-top: 16px;
    background: var(--ardoise);
    border-radius: var(--radius);
    padding: 18px 18px 20px;
    color: var(--craie);
    position:relative;
    overflow:hidden;
  }
  .total-bloc::before{
    content:"";
    position:absolute;
    top:-30px; right:-30px;
    width:120px; height:120px;
    background: radial-gradient(circle, rgba(201,138,60,0.35), transparent 70%);
  }
  .total-label{
    font-size: 0.72rem;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color: #c9bfae;
    font-weight:700;
  }
  .total-chiffre{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2.6rem;
    line-height:1.15;
    margin-top: 2px;
  }
  .total-chiffre sup{
    font-size: 1.1rem;
    font-weight:600;
    margin-left: 2px;
  }
  .total-detail{
    margin-top: 8px;
    font-size: 0.78rem;
    color:#a9a193;
  }

  footer.note{
    text-align:center;
    font-size: 0.7rem;
    color:#9a9080;
    padding: 18px 10px 4px;
  }

  /* Focus visible clavier */
  button:focus-visible{
    outline: 2px solid var(--liege-deep);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  @media (min-width:560px){
    .total-chiffre{ font-size: 3rem; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div>
      <h1>Les marchés d'été</h1>
      <div class="souslogo">Girmont Val d'Ajol</div>
    </div>
    <button class="reset-btn" id="btnReset" type="button">Remise à zéro</button>
  </header>

  <main>
    <div class="ligne" data-id="biere">
      <div class="produit-info">
        <span class="produit-nom">Bière</span>
        <span class="produit-prix">2,50 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer une bière">−</button>
        <span class="count" data-display="biere">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une bière">+</button>
      </div>
    </div>

    <div class="ligne" data-id="cruche">
      <div class="produit-info">
        <span class="produit-nom">Cruche bière</span>
        <span class="produit-prix">15,00 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer une cruche de bière">−</button>
        <span class="count" data-display="cruche">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une cruche de bière">+</button>
      </div>
    </div>

    <div class="ligne" data-id="soft">
      <div class="produit-info">
        <span class="produit-nom">Soft</span>
        <span class="produit-prix">2,00 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer un soft">−</button>
        <span class="count" data-display="soft">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter un soft">+</button>
      </div>
    </div>

    <div class="ligne" data-id="eau">
      <div class="produit-info">
        <span class="produit-nom">Eau</span>
        <span class="produit-prix">1,00 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer une eau">−</button>
        <span class="count" data-display="eau">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une eau">+</button>
      </div>
    </div>

    <div class="ligne" data-id="vin">
      <div class="produit-info">
        <span class="produit-nom">Vin verre</span>
        <span class="produit-prix">1,50 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer un verre de vin">−</button>
        <span class="count" data-display="vin">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter un verre de vin">+</button>
      </div>
    </div>

    <div class="ligne consigne" data-id="consigne">
      <div class="produit-info">
        <span class="produit-nom">Consigne<span class="auto-tag">auto</span></span>
        <span class="produit-prix">1,00 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer une consigne">−</button>
        <span class="count" data-display="consigne">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une consigne">+</button>
      </div>
    </div>

    <div class="ligne consigne" data-id="consigneCruche">
      <div class="produit-info">
        <span class="produit-nom">Consigne cruche<span class="auto-tag">auto</span></span>
        <span class="produit-prix">5,00 €</span>
      </div>
      <div class="stepper">
        <button type="button" data-action="moins" aria-label="Retirer une consigne cruche">−</button>
        <span class="count" data-display="consigneCruche">0</span>
        <button type="button" data-action="plus" aria-label="Ajouter une consigne cruche">+</button>
      </div>
    </div>

    <div class="souslignes">
      <div class="sousligne-row"><span>Boissons</span><span data-display="sous-boissons">0,00 €</span></div>
      <div class="sousligne-row"><span>Consignes</span><span data-display="sous-consigne">0,00 €</span></div>
    </div>

    <div class="total-bloc">
      <div class="total-label">Total à régler</div>
      <div class="total-chiffre"><span data-display="total">0,00</span><sup>€</sup></div>
    </div>
  </main>
</div>


<script>
(function(){
  "use strict";

  var PRIX = {
    biere: 2.5,
    cruche: 15.0,
    soft: 2.0,
    eau: 1.0,
    vin: 1.5,
    consigne: 1.0,
    consigneCruche: 5.0
  };

  // Boissons qui génèrent une consigne automatiquement, et laquelle.
  var LIEN_CONSIGNE = {
    biere: "consigne",
    cruche: "consigneCruche"
  };

  var IDS_BOISSONS = ["biere", "cruche", "soft", "eau", "vin"];
  var IDS_CONSIGNES = ["consigne", "consigneCruche"];

  var etat = { biere: 0, cruche: 0, soft: 0, eau: 0, vin: 0, consigne: 0, consigneCruche: 0 };

  function formatEuro(n){
    return n.toFixed(2).replace(".", ",");
  }

  function maj(){
    IDS_BOISSONS.concat(IDS_CONSIGNES).forEach(function(id){
      document.querySelector('[data-display="' + id + '"]').textContent = etat[id];
    });

    var totalBoissons = 0;
    IDS_BOISSONS.forEach(function(id){ totalBoissons += etat[id] * PRIX[id]; });

    var totalConsigne = 0;
    IDS_CONSIGNES.forEach(function(id){ totalConsigne += etat[id] * PRIX[id]; });

    var total = totalBoissons + totalConsigne;

    document.querySelector('[data-display="sous-boissons"]').textContent = formatEuro(totalBoissons) + " €";
    document.querySelector('[data-display="sous-consigne"]').textContent = formatEuro(totalConsigne) + " €";
    document.querySelector('[data-display="total"]').textContent = formatEuro(total);
  }

  function changer(id, delta){
    // Consignes : ajustables librement, jamais sous zéro.
    if(IDS_CONSIGNES.indexOf(id) !== -1){
      etat[id] = Math.max(0, etat[id] + delta);
      maj();
      return;
    }

    etat[id] = Math.max(0, etat[id] + delta);

    // Si cette boisson a une consigne associée, on la fait suivre du même delta.
    var idConsigne = LIEN_CONSIGNE[id];
    if(idConsigne){
      etat[idConsigne] = Math.max(0, etat[idConsigne] + delta);
    }

    maj();
  }

  document.querySelectorAll(".ligne").forEach(function(ligne){
    var id = ligne.getAttribute("data-id");
    ligne.querySelectorAll("button[data-action]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var action = btn.getAttribute("data-action");
        changer(id, action === "plus" ? 1 : -1);
      });
    });
  });

  var btnReset = document.getElementById("btnReset");
  var resetArme = false;
  var resetTimer = null;

  btnReset.addEventListener("click", function(){
    if(!resetArme){
      resetArme = true;
      btnReset.textContent = "Confirmer ?";
      btnReset.classList.add("reset-arme");
      clearTimeout(resetTimer);
      resetTimer = setTimeout(function(){
        resetArme = false;
        btnReset.textContent = "Remise à zéro";
        btnReset.classList.remove("reset-arme");
      }, 3000);
      return;
    }

    clearTimeout(resetTimer);
    resetArme = false;
    btnReset.textContent = "Remise à zéro";
    btnReset.classList.remove("reset-arme");

    etat = { biere: 0, cruche: 0, soft: 0, eau: 0, vin: 0, consigne: 0, consigneCruche: 0 };
    maj();
  });

  maj();
})();
</script>

</body>
</html>
